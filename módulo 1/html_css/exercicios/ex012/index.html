<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>este video esta hospedado no meu próprio servidor</p>
    <video src="midia/Sky-webm-700.webm" width="500" controls></video>
    <video width=500 poster="imagem/capa.png" controls>
        <source src="midia/Sky-mp4-700.mp4" type="video/mp4">
        <source src="midia/Sky-webm-700.webm" type="video/webm">
        <p>seu navegador nao tem compatibilidade com reprodução de vídeo</p>
        <source src="" type="">
    </video>

    <h1>Inserindo vídeos do youtube</h1>
 <iframe width="560" height="315"

frameborder="0"

allowfullscreen>
</iframe>

</html>
