<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table>
        <thead>
            <tr class="titulo">
                <th rowspan="2">ÁREA</th>
                <th rowspan="2">DISCIPLINA</th>
                <th colspan="2">NOTAS</th>
                <th rowspan="2">MÉDIA</th>
                
            </tr>
            <tr class="titulo">
                <th>NOTA 1</th>
                <th>NOTA 2</th>
            </tr>
            <tr>
                <th rowspan="4">EXATAS</th>
                <td>Matemática</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                
            </tr>
            <tr>
                <td>Química</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
            </tr>
            
            </tr>
            <tr class="titulo">
                <th colspan="4">MÉDIA DE EXATAS</th>
                <td>0</td>
            </tr>
            <tr>
                <th rowspan="2">HUMANAS</th>
                <td>História</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
            </tr>
            <tr class="titulo">
                <th colspan="4">MÉDIA DE HUMANAS</th>
                <td>0</td>
            </tr>
        
    </table>
    
</body>
</html>
