<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <style>
        /*DECLARAÇÃO GERAL*/
        html, body{
            width: 100vw;
            height: 100vh;
            background-color: rgb(19, 168, 76);
            background-size: cover;
            background-repeat: no-repeat;}

        h1{
            color: wheat;
            text-shadow: 3px 3px 02px rgb(22, 62, 22);
            padding: 10px;}

        /*DECLARAÇÃO RETRATO*/
        @media screen and (orientation: portrait){
            body{
                background-image: url(../mq003/imagens/cev-portrait.jpg);
                background-position: center bottom;}
        }

        /*DECLARAÇÃO PAISAGEM*/
        @media screen and (orientation: landscape){
            body{
                background-image: url(../mq003/imagens/cev-landscape.jpg);
                background-position: left bottom;}
        }

    </style>
</head>
<body>
    <h1>Mude a orientação do seu dispositivo</h1>
</body>
</html>
