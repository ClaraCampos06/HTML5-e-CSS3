<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        .container{
            background-color: red;
            display: flex;
            flex-flow: row nowrap;
            
        }
        .item{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 250px;
        }
        div#cx0{
            flex: 1 1 150px;}
        div#cx1{
            flex: 0 1 150px;}
        div#cx2{
            flex: 1 1 150px;}

            /*ORDEM SHORTHAND:
            grow
            shrink
            basis
            */
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="cx0">0</div>
        <div class="item" id="cx1">1</div>
        <div class="item" id="cx2">2</div>
        
    </div>
</body>
</html>
