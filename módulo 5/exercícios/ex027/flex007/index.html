<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.container{
            background-color: red;
            display: flex;
            flex-flow: row wrap;
            
        }
        div.item{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 20px;
        }

        div#i1{order: 0;}
        div#i2{order: 0;}
        div#i3{order: 0;}
        div#i4{order: 0;}
        div#i5{order: 0;}
        div#i6{order: 0;}
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">0</div>
        <div class="item" id="i2">1</div>
        <div class="item" id="i3">2</div>
        <div class="item" id="i4">3</div>
        <div class="item" id="i5">4</div>
        <div class="item" id="i6">5</div>
    </div>
</body>
</html>
